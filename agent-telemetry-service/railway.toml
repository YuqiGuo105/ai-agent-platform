[build]
builder = "dockerfile"
dockerfilePath = "agent-telemetry-service/Dockerfile"

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.variables]]
name = "SERVER_PORT"
value = "8082"

[[deploy.variables]]
name = "SPRING_PROFILES_ACTIVE"
value = "production"

[[deploy.variables]]
name = "JAVA_OPTS"
value = "-Xmx512m -Xms256m"