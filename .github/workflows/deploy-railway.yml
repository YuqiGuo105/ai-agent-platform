# Deploy to Railway on push to main/master
name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  JAVA_VERSION: "21"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build and test before deployment
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        run: mvn -B -U -DskipITs=true clean verify

      - name: Package JARs
        run: mvn -B -DskipTests=true package

  # ──────────────────────────────────────────────────────────────
  # Deploy to Railway
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Railway Token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ RAILWAY_TOKEN not found!"
            echo "To fix this:"
            echo "1. Go to https://railway.app/account/tokens"
            echo "2. Create a new API token"
            echo "3. Add it as RAILWAY_TOKEN secret in GitHub repo settings"
            echo "4. Re-run this workflow"
            echo ""
            echo "## 🚫 Railway Token Missing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required**: Set up Railway deployment token" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Steps to fix:" >> $GITHUB_STEP_SUMMARY
            echo "1. 🔗 Go to [Railway Tokens](https://railway.app/account/tokens)" >> $GITHUB_STEP_SUMMARY
            echo "2. 🔑 Create a new API token" >> $GITHUB_STEP_SUMMARY
            echo "3. ⚙️ Add it as \`RAILWAY_TOKEN\` in [GitHub Secrets](https://github.com/${{ github.repository }}/settings/secrets/actions)" >> $GITHUB_STEP_SUMMARY
            echo "4. 🔄 Re-run this workflow" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Alternative: Manual Deployment" >> $GITHUB_STEP_SUMMARY
            echo "You can also deploy manually from your local machine:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "cd agent-tools-service" >> $GITHUB_STEP_SUMMARY
            echo "railway login" >> $GITHUB_STEP_SUMMARY
            echo "railway up" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Railway token found"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy agent-tools-service
        run: |
          # Configure for agent-tools-service deployment
          cat > railway.toml << 'EOF'
          [build]
          builder = "dockerfile"
          dockerfilePath = "agent-tools-service/Dockerfile"

          [deploy]
          healthcheckPath = "/actuator/health"
          healthcheckTimeout = 300
          restartPolicyType = "on_failure"
          restartPolicyMaxRetries = 3

          [[deploy.variables]]
          name = "SERVER_PORT"
          value = "8081"

          [[deploy.variables]]
          name = "SPRING_PROFILES_ACTIVE"
          value = "production"

          [[deploy.variables]]
          name = "JAVA_OPTS"
          value = "-Xmx512m -Xms256m"
          EOF
          
          # Check if project ID is set
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "❌ RAILWAY_PROJECT_ID not found!"
            echo "1. Go to https://railway.app/dashboard"
            echo "2. Click your project → Settings → Copy Project ID"
            echo "3. Add it as RAILWAY_PROJECT_ID in GitHub Secrets"
            exit 1
          fi
          
          # Deploy using Railway CLI with project ID
          echo "🚀 Deploying to Railway..."
          railway up --detach
          
          echo "## ✅ Deployment Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Builder: Docker" >> $GITHUB_STEP_SUMMARY  
          echo "- 📦 Service: agent-tools-service" >> $GITHUB_STEP_SUMMARY
          echo "- 🔧 Features: WeatherTool + 6 other MCP tools" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Port: 8081" >> $GITHUB_STEP_SUMMARY
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  # ──────────────────────────────────────────────────────────────  
  # Verify deployment
  # ──────────────────────────────────────────────────────────────
  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Wait for deployment
        run: sleep 180

      - name: Test deployment endpoints
        run: |
          echo "Testing Railway deployment endpoints..."
          
          # Test known production URLs
          URLS=(
            "https://agent-tools-service-production.up.railway.app"
            "https://web-production-4e0c.up.railway.app"
          )
          
          for url in "${URLS[@]}"; do
            echo "Testing: $url"
            
            # Test health endpoint
            if curl -f "$url/actuator/health" -m 30 -s; then
              echo "✅ Health check passed for $url"
              
              # Test MCP tools endpoint
              echo "Testing MCP tools endpoint..."
              RESPONSE=$(curl -X POST "$url/mcp/list_tools" \
                -H "Content-Type: application/json" \
                -d '{}' -m 30 -s -w "%{http_code}" -o response.json)
              
              if [[ "$RESPONSE" == "200" ]]; then
                echo "✅ MCP tools endpoint working"
                echo "Available tools:"
                cat response.json | head -20
                break
              else 
                echo "❌ MCP endpoint returned status: $RESPONSE"
              fi
            else
              echo "❌ Health check failed for $url"
            fi
            echo "---"
          done
        continue-on-error: true

      - name: Create deployment summary
        run: |
          echo "## 🚀 Railway Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deployment triggered to Railway" >> $GITHUB_STEP_SUMMARY
          echo "- 🔧 agent-tools-service with WeatherTool deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧪 Test Weather Query:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "curl -X POST [RAILWAY_URL]/mcp/call_tool \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  -H \"Content-Type: application/json\" \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  -d '{\"name\":\"weather.query\",\"arguments\":{\"location\":\"salt lake city\"}}'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
