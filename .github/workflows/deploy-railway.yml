# Deploy to Railway on push to main/master
# Simplified deployment for Railway multi-service project

name: Deploy to Railway

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  JAVA_VERSION: "21"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build and test before deployment
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        run: mvn -B -U -DskipITs=true clean verify

      - name: Package JARs
        run: mvn -B -DskipTests=true package

  # ──────────────────────────────────────────────────────────────
  # Deploy to Railway
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy agent-tools-service
        run: |
          # Configure for agent-tools-service
          cat > railway.toml << EOF
          [build]
          builder = "dockerfile"
          dockerfilePath = "agent-tools-service/Dockerfile"

          [deploy]
          healthcheckPath = "/actuator/health"
          healthcheckTimeout = 300
          restartPolicyType = "on_failure"
          restartPolicyMaxRetries = 3
          EOF
          
          # Deploy using Railway CLI
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Verify deployment
  # ──────────────────────────────────────────────────────────────
  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 120

      - name: Test endpoints
        run: |
          echo "Testing Railway deployment endpoints..."
          # Try the known production URLs first
          for url in "https://agent-tools-service-production.up.railway.app" "https://web-production-4e0c.up.railway.app"; do
            echo "Testing $url"
            if curl -f "$url/actuator/health" -m 30; then
              echo "✅ Health check passed for $url"
              # Test MCP tools endpoint
              curl -X POST "$url/mcp/list_tools" \
                -H "Content-Type: application/json" \
                -d '{}' -m 30 || echo "MCP endpoint test failed"
              break
            else
              echo "❌ Health check failed for $url"
            fi
          done
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment triggered to Railway" >> $GITHUB_STEP_SUMMARY
          echo "📋 Check Railway dashboard for deployment status" >> $GITHUB_STEP_SUMMARY

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd ${{ github.workspace }}
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up --service agent-knowledge --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Deploy agent-knowledge-ui (Frontend)
  # ──────────────────────────────────────────────────────────────
  deploy-agent-knowledge-ui:
    name: Deploy agent-knowledge-ui
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'agent-knowledge-ui' || github.event.inputs.service == ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'agent-knowledge-ui/package-lock.json'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd ${{ github.workspace }}
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          railway up --service agent-knowledge-ui --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Post-deployment health checks
  # ──────────────────────────────────────────────────────────────
  health-check:
    name: Health Check
    needs: [deploy-agent-service, deploy-agent-tools-service, deploy-agent-telemetry-service, deploy-agent-knowledge, deploy-agent-knowledge-ui]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Wait for deployments to stabilize
        run: sleep 60

      - name: Check agent-service health
        run: |
          curl -sf "${{ secrets.AGENT_SERVICE_URL }}/actuator/health" || echo "agent-service health check pending"
        continue-on-error: true

      - name: Check agent-tools-service health
        run: |
          curl -sf "${{ secrets.AGENT_TOOLS_SERVICE_URL }}/actuator/health" || echo "agent-tools-service health check pending"
        continue-on-error: true

      - name: Check agent-telemetry-service health
        run: |
          curl -sf "${{ secrets.AGENT_TELEMETRY_SERVICE_URL }}/actuator/health" || echo "agent-telemetry-service health check pending"
        continue-on-error: true

      - name: Check agent-knowledge health
        run: |
          curl -sf "${{ secrets.AGENT_KNOWLEDGE_URL }}/actuator/health" || echo "agent-knowledge health check pending"
        continue-on-error: true

      - name: Check agent-knowledge-ui health
        run: |
          curl -sf "${{ secrets.AGENT_KNOWLEDGE_UI_URL }}/" || echo "agent-knowledge-ui health check pending"
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| agent-service | ${{ needs.deploy-agent-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-tools-service | ${{ needs.deploy-agent-tools-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-telemetry-service | ${{ needs.deploy-agent-telemetry-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-knowledge | ${{ needs.deploy-agent-knowledge.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-knowledge-ui | ${{ needs.deploy-agent-knowledge-ui.result }} |" >> $GITHUB_STEP_SUMMARY
